<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fingerprint Authentication System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2a10 10 0 0 0-10 10 10 10 0 0 0 10 10 10 10 0 0 0 10-10A10 10 0 0 0 12 2Z"/>
                    <path d="M12 2a10 10 0 0 0-10 10"/>
                    <path d="M12 6a4 4 0 0 0-4 4"/>
                    <path d="M12 10a4 4 0 0 0-4 4"/>
                    <path d="M12 14a4 4 0 0 0-4 4"/>
                    <path d="M12 18a4 4 0 0 0-4 4"/>
                    <path d="M12 22a4 4 0 0 0-4 4"/>
                    <!-- Simplified fingerprint icon using concentric paths -->
                    <path d="M8.5 10c0-1.9 1.6-3.5 3.5-3.5s3.5 1.6 3.5 3.5c0 .7-.2 1.4-.5 2" />
                    <path d="M12 13.5v4" />
                    <path d="M15.5 16.5c-1 1-2.5 1.5-4 1.5s-2.5-.5-3.5-1.5" />
                    <path d="M6 10c0-3.3 2.7-6 6-6s6 2.7 6 6" />
                </svg>
            </div>
            <h1>Secure Access</h1>
            <p>Use your device's fingerprint or biometric sensor to continue.</p>
        </header>

        <main>
            <!-- Messages Container -->
            <div id="message-container" class="message hidden"></div>

            <!-- Auth Container (Visible when logged out) -->
            <div id="auth-container">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
                </div>

                <div class="button-group">
                    <button id="btn-register" class="btn btn-secondary">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
                        Register Fingerprint
                    </button>
                    <button id="btn-login" class="btn btn-primary">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                        Login
                    </button>
                </div>
            </div>

            <!-- Profile Container (Visible when logged in) -->
            <div id="profile-container" class="hidden">
                <div class="profile-card">
                    <div class="avatar">
                        <span id="profile-initial">?</span>
                    </div>
                    <h2>Welcome back,</h2>
                    <h3 id="profile-username">User</h3>
                    <p class="status">
                        <span class="indicator online"></span>
                        Successfully authenticated via WebAuthn
                    </p>
                    <button id="btn-logout" class="btn btn-secondary mt-4">Log Out</button>
                </div>
            </div>
        </main>
    </div>

    <!-- WebAuthn Client Library -->
    <script src="https://unpkg.com/@simplewebauthn/browser/dist/bundle/index.umd.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
